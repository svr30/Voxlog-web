{% extends 'base.html' %}
{% block title %}Add New Post - VoxLog{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="text-center mb-4">
        <i class="bi bi-mic-plus-fill"></i> Create New Audio Post
    </h2>

    <div class="mb-3 p-3 border rounded bg-light">
        <h5 class="text-center">Record Audio</h5>

        <div class="d-flex justify-content-around my-3">

            <!-- ✅ RECORD BUTTON -->
            <button id="recordButton" class="btn btn-danger btn-lg">
                <i class="bi bi-mic-fill"></i> Record
            </button>

            <!-- ✅ STOP BUTTON -->
            <button id="stopButton" class="btn btn-secondary btn-lg" disabled>
                <i class="bi bi-stop-fill"></i> Stop
            </button>

        </div>

        <div id="timer" class="text-center fw-bold">00:00</div>

        <div id="audioPlaybackContainer" style="display:none;">
            <audio id="audioPlayback" controls></audio>
            <button id="useRecordingButton" class="btn btn-success mt-2">
                Use this recording
            </button>
        </div>

        <p id="recordingStatus" class="text-center text-muted"></p>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="caption" class="form-control mb-2" placeholder="Caption">

        <input type="file" id="audio_file" name="audio_file" class="form-control">

        <button type="submit" class="btn btn-primary mt-3 w-100">
            Upload
        </button>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
{% load static %}
<script src="{% static 'app/js/recorder.js' %}"></script>
{% endblock %}
